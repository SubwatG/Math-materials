<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 330">
<style>text{fill:#161616;font-family:IBM Plex Sans Thai Looped,Arial,sans-serif} path.curve{fill:#0F62FE;fill-opacity:.25;stroke:#0F62FE;stroke-width:4} line{stroke:#161616;stroke-width:2;stroke-dasharray:5 5} .mean{stroke:#DA1E28}.med{stroke:#0F62FE}.mode{stroke:#78A9FF}
@media (prefers-color-scheme: dark) {
  text { fill: #F4F4F4 !important; }
  [fill="#0F62FE"] { fill: #78A9FF !important; }
  [stroke="#0F62FE"] { stroke: #78A9FF !important; }
  [fill="#78A9FF"] { fill: #0F62FE !important; }
  [stroke="#78A9FF"] { stroke: #0F62FE !important; }
  [fill="#161616"] { fill: #F4F4F4 !important; }
  [stroke="#161616"] { stroke: #F4F4F4 !important; }
  [fill="#525252"] { fill: #C6C6C6 !important; }
  [stroke="#525252"] { stroke: #C6C6C6 !important; }
  [fill="#FFFFFF"] { fill: #262626 !important; }
  [stroke="#FFFFFF"] { stroke: #262626 !important; }
  [fill="#DA1E28"] { fill: #FF8389 !important; }
  [stroke="#DA1E28"] { stroke: #FF8389 !important; }
  [fill="#F1C21B"] { fill: #F1C21B !important; }
  [stroke="#F1C21B"] { stroke: #F1C21B !important; }
}</style>
<text x="480" y="32" text-anchor="middle" font-size="26" font-weight="700">Mean, Median, Mode and Shape</text>
<g transform="translate(20,70)"><path class="curve" d="M20,180 C80,180 110,20 160,20 C210,20 240,180 300,180 Z"/><line class="mean" x1="160" y1="180" x2="160" y2="35"/><text x="160" y="215" text-anchor="middle" font-size="18">Symmetric</text><text x="160" y="238" text-anchor="middle" font-size="14">Mean = Median = Mode</text></g>
<g transform="translate(330,70)"><path class="curve" d="M20,180 C120,175 150,35 210,25 C250,20 275,145 300,180 Z"/><line class="mean" x1="155" y1="180" x2="155" y2="125"/><line class="med" x1="200" y1="180" x2="200" y2="75"/><line class="mode" x1="225" y1="180" x2="225" y2="35"/><text x="160" y="215" text-anchor="middle" font-size="18">Left-skewed</text><text x="160" y="238" text-anchor="middle" font-size="14">Mean &lt; Median &lt; Mode</text></g>
<g transform="translate(640,70)"><path class="curve" d="M20,180 C45,145 70,20 110,25 C170,35 200,175 300,180 Z"/><line class="mode" x1="95" y1="180" x2="95" y2="35"/><line class="med" x1="125" y1="180" x2="125" y2="75"/><line class="mean" x1="170" y1="180" x2="170" y2="125"/><text x="160" y="215" text-anchor="middle" font-size="18">Right-skewed</text><text x="160" y="238" text-anchor="middle" font-size="14">Mode &lt; Median &lt; Mean</text></g>
</svg>